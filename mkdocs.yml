site_name: White Ravens Services Documentation
theme:
  name: material
  custom_dir: overrides
  favicon: images/favicon.png
  language: en
  icon:
    logo: material/vector-difference
  palette: 
    # Palette toggle for dark mode
    - scheme: default
      primary: blue
      accent: red
      toggle:
        icon: material/brightness-4
        name: Dark mode
    # Palette toggle for light mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Light mode
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pl
          name: Polski
          build: true
          theme:
            language: pl
            palette:
              - scheme: default
                primary: blue
                accent: red
                toggle:
                  icon: material/brightness-4
                  name: Tryb dzienny
              - scheme: slate
                primary: teal
                accent: deep orange
                toggle:
                  icon: material/brightness-7
                  name: Tryb nocny
          nav_translations:
            Documentation: Dokumentacja
            Home: Strona Główna
            Introduction: Wprowadzenie
            Bug Reports: Zgłaszanie błędów
            Password Security: Bezpieczeństwo haseł
            Tags: Tagi
            Social: Social
            White Ravens Services: Usługi White Ravens
            Archivum Null: Archivum Null
            Element Chat: Element Chat
            Meta Search: Metawyszukiwarka
            PrivateBin: PrivateBin
            Invidious: Invidious
            Habitica: Habitica
            Dashboard: Dashboard
            Service Status: Status Usług
  - typeset
  - search
  - tags

hooks:
  - hooks.py

markdown_extensions:
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/language-redirect.js
extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Polski
      link: /pl/
      lang: pl
  social:
    - icon: fontawesome/brands/mastodon
      link: https://mastodon.social/@whiteravens
      name: Mastodon
    - icon: fontawesome/brands/discord
      link: https://discord.gg/5JMk8Z4
      name: Discord
    - icon: fontawesome/brands/steam
      link: https://steamcommunity.com/groups/whiteravensgaming
      name: Steam
    - icon: fontawesome/brands/github 
      link: https://github.com/whiteravens20
      name: GitHub
    - icon: simple/kofi
      link: https://ko-fi.com/N4N4E0LR2
      name: Support us on Ko-fi
  analytics:
    provider: custom
#    property:
  status:
    wrmembers: White Ravens internal service
    new: Recently added
    deprecated: Needs update
# Copyright is dynamically set by hooks.py (on_config)
copyright: Copyright &copy; 2024 White Ravens 2.0

nav:
  - White Ravens Home: https://whiteravens.net
  - Documentation:
    - Home:
      - Introduction: index.md
      - Bug Reports: bugs.md
      - Password Security: passwordsec.md
      - Tags: tags.md
    - Social:
      - Discord: discord.md
      - Mastodon: mastodon.md
      - Steam: steam.md
    - White Ravens Services:
      - Archivum Null: archivum-null.md
      - Element Chat: chat.md
      - Meta Search: search.md
      - PrivateBin: privatebin.md
      - Invidious: invidious.md
      - Habitica: habitica.md
  - Dashboard: https://home.wrservices.link
  - Service Status: https://status.wrservices.link
  - GitHub: https://github.com/whiteravens20