name: Build Check
on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6

      - run: pip install mkdocs-material

      - name: Build MkDocs site (strict)
        run: mkdocs build --strict
